<body>
    <div class="container">
        <h2>Booking Details</h2>

        <p>Name: {{ name }}</p>
        <p>Train: {{ train }}</p>

        <form action="/confirm" method="post">
            <input type="hidden" name="name" value="{{ name }}">
            <input type="hidden" name="train" value="{{ train }}">
            <button type="submit">Confirm Ticket</button>
        </form>
    </div>
</body>
